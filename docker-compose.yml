services:
  arus:
    image: ghcr.io/666ghj/arus:latest
    # Optional mirror image if pulls are slow
    # image: ghcr.nju.edu.cn/666ghj/arus:latest
    container_name: arus
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads
